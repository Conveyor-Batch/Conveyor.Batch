name: Publish to NuGet

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version to publish (e.g. 0.1.0-beta.2). Required for manual runs; ignored for release-triggered runs, which derive the version from the release tag.'
        required: false

jobs:
  publish:
    name: Pack & Push to NuGet
    runs-on: ubuntu-latest
    environment: nuget
    permissions:
      id-token: write  # required for OIDC trusted publishing

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Resolve package version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="${{ github.event.inputs.version }}"
          fi
          if [[ -z "$version" ]]; then
            echo "::error::No version resolved. For a manual run, supply the 'version' input." >&2
            exit 1
          fi
          echo "Resolved package version: $version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore ConveyorBatch.slnx

      - name: Build
        run: dotnet build ConveyorBatch.slnx --no-restore --configuration Release /p:Version=${{ steps.version.outputs.version }}

      - name: Pack
        run: |
          dotnet pack src/Conveyor.Batch/Conveyor.Batch.csproj --no-build --configuration Release --output ./nupkgs /p:Version=${{ steps.version.outputs.version }}
          dotnet pack src/Conveyor.Batch.EntityFrameworkCore/Conveyor.Batch.EntityFrameworkCore.csproj --no-build --configuration Release --output ./nupkgs /p:Version=${{ steps.version.outputs.version }}
          dotnet pack src/Conveyor.Batch.IO/Conveyor.Batch.IO.csproj --no-build --configuration Release --output ./nupkgs /p:Version=${{ steps.version.outputs.version }}
          dotnet pack src/Conveyor.Batch.Http/Conveyor.Batch.Http.csproj --no-build --configuration Release --output ./nupkgs /p:Version=${{ steps.version.outputs.version }}
          dotnet pack src/Conveyor.Batch.Hosting/Conveyor.Batch.Hosting.csproj --no-build --configuration Release --output ./nupkgs /p:Version=${{ steps.version.outputs.version }}
          dotnet pack src/Conveyor.Batch.Testing/Conveyor.Batch.Testing.csproj --no-build --configuration Release --output ./nupkgs /p:Version=${{ steps.version.outputs.version }}

      - name: Push to NuGet
        run: dotnet nuget push ./nupkgs/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
