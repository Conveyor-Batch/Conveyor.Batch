name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }} / .NET ${{ matrix.dotnet }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
        dotnet: [ '8.0.x', '9.0.x', '10.0.x' ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ matrix.dotnet }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: Restore
        run: dotnet restore ConveyorBatch.slnx

      - name: Build
        run: dotnet build ConveyorBatch.slnx --no-restore --configuration Release

      - name: Resolve target framework moniker
        shell: bash
        run: |
          case "${{ matrix.dotnet }}" in
            10.0.x) echo "TFM=net10.0" >> "$GITHUB_ENV" ;;
            9.0.x) echo "TFM=net9.0" >> "$GITHUB_ENV" ;;
            *) echo "TFM=net8.0" >> "$GITHUB_ENV" ;;
          esac

      - name: Test (Unit)
        run: dotnet test tests/Conveyor.Batch.UnitTests --no-build --configuration Release --framework ${{ env.TFM }} --collect:"XPlat Code Coverage" --results-directory ./coverage/unit --logger "trx;LogFileName=unit-test-results.trx"

      # Some integration tests spin up real PostgreSQL/SQL Server containers via Testcontainers
      # and need a reachable Docker daemon. That's guaranteed on ubuntu-latest, so it runs the
      # full suite; windows-latest/macos-latest runners aren't guaranteed to have one, so they
      # run every other integration test but exclude the Docker-dependent ones via trait filter.
      - name: Resolve integration test filter
        shell: bash
        run: |
          if [ "${{ matrix.os }}" == "ubuntu-latest" ]; then
            echo "INTEGRATION_FILTER=" >> "$GITHUB_ENV"
          else
            echo "INTEGRATION_FILTER=--filter Category!=RequiresDocker" >> "$GITHUB_ENV"
          fi

      - name: Test (Integration)
        run: dotnet test tests/Conveyor.Batch.IntegrationTests --no-build --configuration Release --framework ${{ env.TFM }} ${{ env.INTEGRATION_FILTER }} --collect:"XPlat Code Coverage" --results-directory ./coverage/integration --logger "trx;LogFileName=integration-test-results.trx"

      - name: Enforce coverage threshold (Conveyor.Batch core)
        shell: pwsh
        run: ./scripts/check-coverage.ps1 -CoverageDirectory ./coverage/unit -PackageName "Conveyor.Batch" -Threshold 80

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.dotnet == '10.0.x'
        uses: codecov/codecov-action@v4
        with:
          directory: ./coverage
          fail_ci_if_error: false
